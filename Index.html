<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHRIS - Warrior Protocol</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* Se mantiene tu diseño original exacto */
@font-face{font-family:'Bebas Neue';src:local('Bebas Neue'),local('BebasNeue');}
:root{
  --sage:   #2d6a4f; --peach:  #1a4f8a; --lavend: #c45c10; --sky:    #1a4a7a;
  --butter: #7a6010; --rose:   #7a2038; --mint:   #1a5c4a; --bg:     #1a1a18;
  --card:   #242420; --card2:  #2e2e2a; --line:   #3a3a36; --line2:  #484844;
  --ink:    #f4f2ec; --ink2:   #9a9890; --ink3:   #5a5850;
  --fn: 'DM Mono','Courier New',monospace;
  --fh: 'Bebas Neue','Impact','Arial Narrow',sans-serif;
  --fi: 'Georgia','Garamond',serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--ink);min-height:100vh;font-size:13px;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;height:54px;padding:0 20px;}
.nav-logo{font-family:var(--fh);font-size:20px;letter-spacing:6px;color:#4a90d8;padding-right:20px;margin-right:16px;border-right:1px solid var(--line);}
.tab-btn{background:none;border:none;cursor:pointer;padding:7px 18px;border-radius:20px;font-family:var(--fn);font-size:11px;color:var(--ink3);text-transform:uppercase;}
.tab-btn.active{background:var(--peach);color:#fff;font-weight:700;}
.date-bar{position:fixed;top:54px;left:0;right:0;z-index:99;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:40px;}
main{padding-top:98px;max-width:900px;margin:0 auto;padding-bottom:50px;}
.block{border-radius:16px;padding:20px;margin-bottom:14px;}
.b-mind{background:var(--lavend);color:#f8f0e8;}
.b-body{background:var(--peach);color:#e8f0f8;}
.field-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.12);}
input[type="number"], input[type="text"], textarea{background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.1);color:inherit;border-radius:8px;padding:6px 10px;outline:none;}
/* Estilo específico para el contador de Ruso */
.ruso-counter{width:80px;text-align:center;font-weight:bold;font-size:15px;border:1px solid rgba(255,255,255,0.4)!important;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CHRIS</div>
  <div class="nav-tabs">
    <button class="tab-btn active">Daily</button>
  </div>
</nav>

<div class="date-bar">
  <div style="font-size:12px;" id="dateDisplay">Cargando...</div>
  <div id="syncStatus" style="font-size:9px;color:var(--sage);">● En línea</div>
</div>

<main id="appContent">
  <div class="block b-mind">
    <h2 style="font-family:var(--fh); font-size:28px; letter-spacing:2px; margin-bottom:15px;">MENTE</h2>
    
    <div class="field-row">
      <div>
        <div style="font-weight:bold;">Palabras de Ruso</div>
        <div style="font-size:9px; opacity:0.7;">Meta diaria: 10 palabras</div>
      </div>
      <input type="number" id="hab_ruso_val" class="ruso-counter" placeholder="0" oninput="autoSave()">
    </div>

    <div class="field-row">
      <label>Meditación / Enfoque</label>
      <input type="checkbox" id="hab_medita" onchange="autoSave()">
    </div>
  </div>

  <div class="block b-body">
    <h2 style="font-family:var(--fh); font-size:28px; letter-spacing:2px; margin-bottom:15px;">CUERPO</h2>
    <div class="field-row">
      <label>Pasos (Meta 8k)</label>
      <input type="number" id="workout_steps" style="width:100px;" oninput="autoSave()">
    </div>
    <div class="field-row">
      <label>Proteína (Meta 130g)</label>
      <input type="number" id="nutricion_prot" style="width:100px;" oninput="autoSave()">
    </div>
  </div>
</main>

<script>
// CONFIGURACIÓN DE TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDZSkVGF59msUzmd4vrWx999THkigj8HGU",
  authDomain: "chris-warrior.firebaseapp.com",
  databaseURL: "https://chris-warrior-default-rtdb.firebaseio.com",
  projectId: "chris-warrior",
  storageBucket: "chris-warrior.firebasestorage.app",
  messagingSenderId: "124216838630",
  appId: "1:124216838630:web:7c254172f3c2383110ee27"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getDate() {
  return new Date().toISOString().slice(0, 10);
}

// FUNCIÓN DE AUTO-GUARDADO (Hacia Firebase)
function autoSave() {
  const date = getDate();
  const data = {
    ruso: document.getElementById('hab_ruso_val').value || 0,
    medita: document.getElementById('hab_medita').checked,
    steps: document.getElementById('workout_steps').value || 0,
    protein: document.getElementById('nutricion_prot').value || 0,
    lastUpdate: new Date().getTime()
  };

  // Guardar en la nube (Sincronización instantánea)
  db.ref('tracker/' + date).set(data);
  
  // Guardar copia local por seguridad
  localStorage.setItem('tracker_' + date, JSON.stringify(data));
  
  showToast();
}

// ESCUCHADOR EN TIEMPO REAL (Para recibir cambios de otros dispositivos)
function initSync() {
  const date = getDate();
  document.getElementById('dateDisplay').textContent = "Hoy: " + date;

  db.ref('tracker/' + date).on('value', (snapshot) => {
    const val = snapshot.val();
    if (val) {
      // Actualizar la interfaz sin borrar lo que el usuario está escribiendo si fue hace menos de 2 seg
      if (document.activeElement.tagName !== 'INPUT') {
        document.getElementById('hab_ruso_val').value = val.ruso || 0;
        document.getElementById('hab_medita').checked = val.medita || false;
        document.getElementById('workout_steps').value = val.steps || 0;
        document.getElementById('nutricion_prot').value = val.protein || 0;
      }
    }
  });
}

function showToast() {
  const status = document.getElementById('syncStatus');
  status.textContent = "● Sincronizado";
  status.style.color = "#2d6a4f";
  setTimeout(() => { status.textContent = "● En línea"; }, 2000);
}

window.onload = initSync;
</script>

</body>
</html>
